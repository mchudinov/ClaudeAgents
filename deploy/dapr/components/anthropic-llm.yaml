apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: anthropic-llm
spec:
  type: conversation.anthropic
  version: v1
  metadata:
    - name: key
      secretKeyRef:
        name: ANTHROPIC_API_KEY
        key: ANTHROPIC_API_KEY
    - name: model
      # Dapr's conversation.anthropic component sends `temperature` on every
      # request and offers no metadata switch to suppress it. claude-opus-4-7
      # rejects requests that include `temperature` (HTTP 400, deprecated for
      # that model), so stay on a model that still accepts it.
      value: claude-sonnet-4-6
    - name: cacheTTL
      value: 10m
auth:
  secretStore: envvar-secretstore
